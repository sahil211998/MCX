services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mcx
      POSTGRES_USER: mcx_user
      POSTGRES_PASSWORD: mcx_pass
    # No host port published (avoids conflicts with local Postgres).
    # The web container connects to this DB over the internal compose network at host `db:5432`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcx_user -d mcx -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - mcx_pgdata:/var/lib/postgresql/data

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: mcx
      PGUSER: postgres
      PGPASSWORD: postgres

      # Optional app toggles (safe defaults)
      AUTO_SIGNAL_ENABLED: "1"
      AUTO_SIGNAL_INTERVAL_SECS: "120"
      AUTO_SIGNAL_ONLY_AFTER_RESOLUTION: "1"
      AUTO_SIGNAL_MAX_NEW_CALLS_PER_PRODUCT_PER_DAY: "1"
      INTRADAY_OUTCOME_TZ: Asia/Kolkata
      INTRADAY_OUTCOME_LOCAL_HOUR: "23"
      INTRADAY_OUTCOME_LOCAL_MINUTE: "25"
      PGCONNECT_TIMEOUT: "5"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"

networks:
  default:
    name: mcx_smart_signal_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.201.0.0/24

volumes:
  mcx_pgdata:

